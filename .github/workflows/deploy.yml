name: Deploy to ChemiCloud

on:
  push:
    branches:
      - main # 确保你的主分支名字是 main，如果是 master 请修改这里

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # 强制使用最新的 Node 24 运行环境
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: 检出代码 (Code auschecken)
        uses: actions/checkout@v4

      - name: 安装 pnpm (pnpm installieren)
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 设置 Node.js (Node.js einrichten)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 安装依赖 (Abhängigkeiten installieren)
        run: pnpm install

      - name: 打包静态文件 (Statische Dateien bauen)
        # 注入必要的虚拟环境变量，防止 Shopify 模板因为缺少 Key 而在构建时报错
        env:
          COMPANY_NAME: "Sherry Web"
          SITE_NAME: "Sherry Portfolio"
          SHOPIFY_REVALIDATION_SECRET: "123456"
          SHOPIFY_STORE_DOMAIN: "test.myshopify.com"
          SHOPIFY_STOREFRONT_ACCESS_TOKEN: "123456"
        run: pnpm build

      - name: 通过 FTP 部署 (Bereitstellung über FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # 告诉 GitHub 去搬运刚刚生成的 out 文件夹
          local-dir: ./out/ 
          # 告诉 GitHub 搬运到 FTP 账号默认锁定的根目录
          server-dir: ./