name: Deploy to ChemiCloud

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 检出代码 (Code auschecken)
        uses: actions/checkout@v4

      - name: 安装 pnpm (pnpm installieren)
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 设置 Node.js (Node.js einrichten)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 安装依赖 (Abhängigkeiten installieren)
        run: pnpm install

      - name: 打包静态文件 (Statische Dateien bauen)
        env:
          COMPANY_NAME: "Sherry Web"
          SITE_NAME: "Sherry Portfolio"
          SHOPIFY_REVALIDATION_SECRET: "123456"
          SHOPIFY_STORE_DOMAIN: "test.myshopify.com"
          SHOPIFY_STOREFRONT_ACCESS_TOKEN: "123456"
        run: pnpm build

      - name: 通过 FTPS 部署 (Bereitstellung über FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./out/
          server-dir: ./
